[phases.setup]
nixPkgs = ["nodejs_20"]
# No incluir "caddy" aquí: Nixpacks lo instala solo al detectar Caddyfile.
# Tenerlo en ambos sitios provoca conflicto de versiones en el build de Docker.

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]
# Las variables de entorno VITE_* se pasan automáticamente desde Easypanel

[start]
cmd = "caddy run --config /app/Caddyfile --adapter caddyfile"

